# yaml-language-server: $schema=https://raw.githubusercontent.com/0xERR0R/blocky/main/docs/config.schema.json

upstreams:
  groups:
    default:
      - 1.1.1.1
      - 8.8.8.8
  timeout: 2s
  # Begin serving immediately; upstream health checks continue in the background.
  init:
    strategy: fast

connectIPVersion: dual

blocking:
  denylists:
    ads:
      - https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/gambling-porn/hosts
    custom:
      - |
        ocsp.apple.com
        ocsp2.apple.com
        baidu.com
        /.*\.baidu\.com/
  allowlists:
    ads:
      - |
        s.youtube.com
        video-stats.l.google.com
        youtubei.googleapis.com
        # Wife likes to click ads.
        /.*\.googleadservices\.com/
        # Required to make purchase on Epic store
        tracking.epicgames.com
        # Required by RedHat online learning
        79423.analytics.edgekey.net
        # Required by Home Depot checkout
        nexus.ensighten.com
        # Required by Burger King...
        appboy-images.com
        rest.iad-03.braze.com
  clientGroupsBlock:
    default:
      - ads
      - custom
  blockType: zeroIP
  blockTTL: 1m
  loading:
    refreshPeriod: 4h
    # Do not take the LAN DNS service down while external lists are loading.
    strategy: fast
    downloads:
      timeout: 1m

caching:
  maxItemsCount: 0

clientLookup:
  # Used only for reverse client-name lookup, typically the local router.
  upstream: 10.10.10.1
  singleNameOrder:
    - 2
    - 1

prometheus:
  enable: true
  path: /metrics

queryLog:
  type: sqlite
  target: /var/lib/blocky/querylog.db
  logRetentionDays: 7
  creationAttempts: 1
  creationCooldown: 2s

ports:
  dns: 53
  http: 4000
  tls: 853

minTlsServeVersion: 1.3
bootstrapDns: tcp+udp:1.1.1.1

log:
  level: info
  format: text
  timestamp: true
  privacy: false

# Blocky 0.20 can panic in its EDE resolver on certain SERVFAIL replies.
ede:
  enable: false
