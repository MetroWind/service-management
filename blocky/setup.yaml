- name: Deploy Blocky
  hosts: torna.xeno
  become: yes
  vars:
    blocky_version: 0.33.0
    blocky_archive: "blocky_v{{ blocky_version }}_Linux_x86_64.tar.gz"
    blocky_url: "https://github.com/0xERR0R/blocky/releases/download/v{{ blocky_version }}/{{ blocky_archive }}"
    blocky_cache_dir: /var/cache/blocky
    blocky_extract_dir: "{{ blocky_cache_dir }}/v{{ blocky_version }}"
  tasks:
    - name: Create the Blocky service account
      ansible.builtin.user:
        name: blocky
        system: yes
        shell: /usr/bin/nologin
        create_home: no

    - name: Install the Blocky systemd service
      ansible.builtin.copy:
        src: blocky.service
        dest: /etc/systemd/system/blocky.service
        owner: root
        group: root
        mode: "0644"

    - name: Create the Blocky download cache directory
      ansible.builtin.file:
        path: "{{ blocky_cache_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download the Blocky release
      ansible.builtin.get_url:
        url: "{{ blocky_url }}"
        dest: "{{ blocky_cache_dir }}/{{ blocky_archive }}"
        mode: "0644"

    - name: Create the Blocky extraction directory
      ansible.builtin.file:
        path: "{{ blocky_extract_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Extract the Blocky release
      ansible.builtin.unarchive:
        src: "{{ blocky_cache_dir }}/{{ blocky_archive }}"
        dest: "{{ blocky_extract_dir }}"
        remote_src: yes
        creates: "{{ blocky_extract_dir }}/blocky"

    - name: Install the Blocky binary
      ansible.builtin.copy:
        src: "{{ blocky_extract_dir }}/blocky"
        dest: /usr/local/bin/blocky
        remote_src: yes
        owner: root
        group: root
        mode: "0755"

    - name: Install the Blocky configuration
      ansible.builtin.include_tasks:
        file: tasks-update-config.yaml

    - name: Remove the downloaded Blocky release
      ansible.builtin.file:
        path: "{{ blocky_cache_dir }}/{{ blocky_archive }}"
        state: absent

    - name: Remove the extracted Blocky files
      ansible.builtin.file:
        path: "{{ blocky_extract_dir }}"
        state: absent
