<VirtualHost *:80>
    ServerName diary.xeno.darksair.org
    # For Let's Encrypt challenge.
    RewriteEngine on
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,QSA,R=permanent]
</VirtualHost>
<VirtualHost *:443>
    ServerName diary.xeno.darksair.org
    SSLCertificateFile /etc/letsencrypt/live/xeno.darksair.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/xeno.darksair.org/privkey.pem
    # Apply global rewrite rules.
    RewriteEngine on
    ProxyPreserveHost On
    ProxyPass / "unix:/run/cruel-world/cruel-world.sock|http://127.0.0.1/" nocanon
    ProxyPassReverse / "unix:/run/cruel-world/cruel-world.sock|http://127.0.0.1/"
</VirtualHost>
