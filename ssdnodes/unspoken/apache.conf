<VirtualHost *:80>
    ServerName f.mws.rocks
    # For Let's Encrypt challenge.
    RewriteEngine on
    RewriteRule "^/.well-known/acme-challenge/(.+)" "http://mws.rocks/.well-known/acme-challenge/$1"  [R,L]
    Redirect permanent / https://f.mws.rocks/
</VirtualHost>
<VirtualHost *:443>
    ServerName f.mws.rocks
    SSLEngine on
    # Apply global rewrite rules.
    RewriteEngine on
    ProxyPass / http://127.0.0.1:41189/ nocanon
    ProxyPassReverse / http://127.0.0.1:41189/
</VirtualHost>
