<VirtualHost *:80>
    ServerName music.xeno.darksair.org
    RewriteEngine on
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,QSA,R=permanent]
</VirtualHost>
<VirtualHost *:443>
    ServerName music.xeno.darksair.org
    SSLCertificateFile /etc/letsencrypt/live/xeno.darksair.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/xeno.darksair.org/privkey.pem

    HostnameLookups Off
    UseCanonicalName Off

    ProxyRequests off
    ProxyPass / http://10.10.10.22:4747/
    ProxyPassReverse / http://10.10.10.22:4747/
    ProxyPreserveHost On
</VirtualHost>
