[global]
# This value forms Matrix user and room IDs and must never change.
server_name = "darksair.org"

# This directory contains only Continuwuity's RocksDB database and media tree.
# It must never be shared with Tuwunel or another homeserver.
database_path = "/var/lib/continuwuity"

# Apache on brighid.xeno proxies Matrix requests to this listener.
address = ["0.0.0.0"]
port = 6167

max_request_size = 200_000_000
allow_registration = false
allow_federation = true
trusted_servers = ["matrix.org"]
new_user_displayname_suffix = "💯"
