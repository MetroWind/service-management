- name: Set up Continuwuity
  hosts: obrona.xeno
  become: true
  vars:
    continuwuity_version: "26.6.2"
    continuwuity_asset: conduwuit-linux-amd64
    continuwuity_cache_dir: /var/cache/continuwuity
  tasks:
    - name: Stop and disable Tuwunel
      ansible.builtin.systemd:
        name: tuwunel.service
        state: stopped
        enabled: false

    - name: Stop and disable Conduit
      ansible.builtin.systemd:
        name: conduit.service
        state: stopped
        enabled: false

    - name: Create the Continuwuity service account
      ansible.builtin.copy:
        src: sysusers-continuwuity.conf
        dest: /etc/sysusers.d/continuwuity.conf
        owner: root
        group: root
        mode: "0644"

    - name: Apply the Continuwuity system-user definition
      ansible.builtin.command: systemd-sysusers
      changed_when: false

    - name: Create the download cache directory
      ansible.builtin.file:
        path: "{{ continuwuity_cache_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download the Continuwuity release
      ansible.builtin.get_url:
        url: >-
          {{ "https://forgejo.ellis.link/continuwuation/continuwuity/releases/download/v"
             ~ continuwuity_version ~ "/" ~ continuwuity_asset }}
        dest: "{{ continuwuity_cache_dir }}/{{ continuwuity_asset }}"
        owner: root
        group: root
        mode: "0644"
      register: continuwuity_download

    - name: Check for the Continuwuity binary
      ansible.builtin.stat:
        path: /usr/local/bin/continuwuity
      register: continuwuity_binary

    - name: Install the Continuwuity binary
      ansible.builtin.copy:
        src: "{{ continuwuity_cache_dir }}/{{ continuwuity_asset }}"
        dest: /usr/local/bin/continuwuity
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      when: continuwuity_download.changed or not continuwuity_binary.stat.exists
      notify: Restart Continuwuity

    - name: Remove the downloaded Continuwuity release
      ansible.builtin.file:
        path: "{{ continuwuity_cache_dir }}"
        state: absent

    - name: Create the Continuwuity configuration directory
      ansible.builtin.file:
        path: /etc/continuwuity
        state: directory
        owner: root
        group: continuwuity
        mode: "0750"

    - name: Install the Continuwuity configuration
      ansible.builtin.copy:
        src: continuwuity.toml
        dest: /etc/continuwuity/continuwuity.toml
        owner: root
        group: continuwuity
        mode: "0640"
      notify: Restart Continuwuity

    - name: Give Continuwuity ownership of its prepared data directory
      ansible.builtin.file:
        path: /var/lib/continuwuity
        state: directory
        owner: continuwuity
        group: continuwuity
        recurse: true

    - name: Restrict access to the Continuwuity data directory
      ansible.builtin.file:
        path: /var/lib/continuwuity
        state: directory
        mode: "0700"

    - name: Install the Continuwuity systemd unit
      ansible.builtin.copy:
        src: continuwuity.service
        dest: /etc/systemd/system/continuwuity.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart Continuwuity

    - name: Enable and start Continuwuity
      ansible.builtin.systemd:
        name: continuwuity.service
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart Continuwuity
      ansible.builtin.systemd:
        name: continuwuity.service
        state: restarted

- name: Set up reverse proxy
  hosts: brighid.xeno
  become: true
  tasks:
    - name: Create the local Matrix documentation build directory
      ansible.builtin.file:
        path: "{{ playbook_dir }}/docs/build"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Build Matrix documentation
      ansible.builtin.command:
        argv:
          - pandoc
          - --from=markdown
          - --to=html5
          - --standalone
          - "--template={{ playbook_dir }}/docs/template.html"
          - "--output={{ playbook_dir }}/docs/build/index.html"
          - "{{ playbook_dir }}/docs/index.md"
      changed_when: false
      delegate_to: localhost
      become: false
      run_once: true

    - name: Create the Matrix documentation directory
      ansible.builtin.file:
        path: /srv/http-matrix
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Publish Matrix documentation
      ansible.builtin.copy:
        src: docs/build/
        dest: /srv/http-matrix/
        owner: root
        group: root
        mode: "0644"
        directory_mode: "0755"

    - name: Publish Matrix documentation assets
      ansible.builtin.copy:
        src: docs/static/
        dest: /srv/http-matrix/assets/
        owner: root
        group: root
        mode: "0644"
        directory_mode: "0755"

    - name: Remove retired Matrix documentation page
      ansible.builtin.file:
        path: /srv/http-matrix/getting-started.html
        state: absent

    - name: Copy Apache config
      ansible.builtin.copy:
        src: httpd.conf
        dest: /etc/httpd/conf/extra/matrix.conf
      notify: Restart Apache

    - name: Enable vhost
      ansible.builtin.lineinfile:
        path: /etc/httpd/conf/httpd.conf
        regexp: '^#Include\s+conf/extra/matrix\.conf'
        insertafter: "Probably not exists"
        line: 'Include conf/extra/matrix.conf'
      notify: Restart Apache

    - name: Validate Apache configuration
      ansible.builtin.command: httpd -t
      changed_when: false

  handlers:
    - name: Restart Apache
      ansible.builtin.systemd:
        name: httpd
        state: restarted
